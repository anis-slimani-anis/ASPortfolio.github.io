<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Banner — Anis Slimani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=block" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      font-family: sans-serif;
    }
    canvas#banner {
      display: block;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }
    #download-btn {
      background: #ccccff;
      color: #000;
      border: none;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
    }
    #download-btn:hover { background: #dcdcff; }
    p.note { color: rgba(255,255,255,0.35); font-size: 12px; }
  </style>
</head>
<body>
  <canvas id="banner"></canvas>
  <button id="download-btn">Download PNG (1584 × 396 @ 2×)</button>
  <p class="note">3168 × 792 high-res PNG — LinkedIn scales it down cleanly.</p>

  <script>
    const W = 1584, H = 396, DPR = 2;
    const canvas = document.getElementById('banner');
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    /* Deterministic seeded RNG — same stars every render */
    function rng32(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function drawBanner() {
      const w = W, h = H;
      const rand = rng32(1337);

      /* ── Sky gradient — matches hero canvas exactly ── */
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0,    'rgba(0,0,0,1)');
      sky.addColorStop(0.2,  'rgba(2,2,6,1)');
      sky.addColorStop(0.65, 'rgba(4,4,10,1)');
      sky.addColorStop(1,    'rgba(5,5,14,1)');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      /* ── Nebula ── */
      const neb = ctx.createRadialGradient(w*0.58, h*0.6, 0, w*0.58, h*0.6, w*0.55);
      neb.addColorStop(0,   'rgba(180,180,255,0.02)');
      neb.addColorStop(0.5, 'rgba(150,150,240,0.008)');
      neb.addColorStop(1,   'transparent');
      ctx.fillStyle = neb;
      ctx.fillRect(0, 0, w, h);

      /* ── Stars — exact params from main.js ── */
      const LAYERS = 3;
      const count  = Math.max(90, Math.min(360, Math.round(w * h * 0.00016)));
      for (let i = 0; i < count; i++) {
        const layer  = Math.floor(rand() * LAYERS);
        const bright = i < count * 0.1;
        const x = rand() * w;
        const y = rand() * h;
        const r = bright      ? rand() * 0.5  + 0.6
                : layer === 2 ? rand() * 0.7  + 0.35
                : layer === 1 ? rand() * 0.5  + 0.2
                :               rand() * 0.35 + 0.1;
        const a = bright      ? rand() * 0.2  + 0.8
                : layer === 2 ? rand() * 0.3  + 0.18
                : layer === 1 ? rand() * 0.2  + 0.1
                :               rand() * 0.12 + 0.04;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(235,235,255,${a.toFixed(3)})`;
        ctx.fill();
      }

      /* ── One shooting star ── */
      const sk = ctx.createLinearGradient(0.13*w, 0.22*h, 0.26*w, 0.42*h);
      sk.addColorStop(0,   'rgba(210,210,255,0)');
      sk.addColorStop(0.6, 'rgba(220,220,255,0.18)');
      sk.addColorStop(1,   'rgba(255,255,255,0.65)');
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(0.13*w, 0.22*h);
      ctx.lineTo(0.26*w, 0.42*h);
      ctx.strokeStyle = sk;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0.26*w, 0.42*h, 1.3, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.fill();
      ctx.restore();

      /* ── Layout: badge + 3 title lines grouped and centered as a unit ── */
      const PAD_R    = 88;
      const ACCENT   = '#ccccff';
      const TEXT     = '#eeeef8';
      const titlePx  = 62;
      const tracking = -(titlePx * 0.03);
      const lineH    = titlePx * 1.08;

      /* badge dims (measured before drawing) */
      const badgeText = 'PRODUCT DESIGNER & PRODUCT MANAGER';
      const bSize     = 11;
      const dotD = 5, bGap = 7, bPadX = 12, bPadY = 5;
      ctx.font          = `500 ${bSize}px 'DM Sans', sans-serif`;
      ctx.letterSpacing = '1.54px';
      const badgeW = bPadX + dotD + bGap + ctx.measureText(badgeText).width + bPadX;
      const badgeH = bSize + bPadY * 2;

      /* total group height: badge + gap + 3 title lines */
      const badgeGap  = 16;
      const groupH    = badgeH + badgeGap + lineH * 3;
      const groupTopY = (h - groupH) / 2;

      /* badge position — right-aligned */
      const by = groupTopY;
      const bx = w - PAD_R - badgeW;

      ctx.save();
      ctx.beginPath();
      ctx.roundRect(bx, by, badgeW, badgeH, 4);
      ctx.fillStyle   = 'rgba(204,204,255,0.06)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(204,204,255,0.18)';
      ctx.lineWidth   = 1;
      ctx.stroke();
      ctx.restore();

      ctx.beginPath();
      ctx.arc(bx + bPadX + dotD/2, by + badgeH/2, dotD/2, 0, Math.PI*2);
      ctx.fillStyle = ACCENT;
      ctx.fill();

      ctx.font          = `500 ${bSize}px 'DM Sans', sans-serif`;
      ctx.letterSpacing = '1.54px';
      ctx.fillStyle     = ACCENT;
      ctx.textBaseline  = 'middle';
      ctx.textAlign     = 'left';
      ctx.globalAlpha   = 0.8;
      ctx.fillText(badgeText, bx + bPadX + dotD + bGap, by + badgeH / 2);
      ctx.globalAlpha   = 1;

      /* title lines — baseline of line 1 = groupTopY + badgeH + badgeGap + titlePx */
      const titleBaseY = groupTopY + badgeH + badgeGap + titlePx;
      ctx.font          = `700 ${titlePx}px 'Syne', sans-serif`;
      ctx.letterSpacing = `${tracking.toFixed(2)}px`;
      ctx.textAlign     = 'right';
      ctx.textBaseline  = 'alphabetic';

      ctx.fillStyle = TEXT;
      ctx.fillText('Turning', w - PAD_R, titleBaseY);
      ctx.fillText('complexity', w - PAD_R, titleBaseY + lineH);

      ctx.strokeStyle = ACCENT;
      ctx.lineWidth   = 1.2;
      ctx.lineJoin    = 'round';
      ctx.strokeText('into clarity.', w - PAD_R, titleBaseY + lineH * 2);
    }

    Promise.all([
      document.fonts.load("700 100px 'Syne'"),
      document.fonts.load("500 100px 'DM Sans'"),
    ]).then(() => {
      drawBanner();
    });

    document.getElementById('download-btn').addEventListener('click', () => {
      const url = canvas.toDataURL('image/png');
      const a   = document.createElement('a');
      a.href     = url;
      a.download = 'anis-slimani-linkedin-banner.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
  </script>
</body>
</html>
